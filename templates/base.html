<!DOCTYPE html>
<html>
<style>
    body {
		--col1: #fcebb7; /*#fcebb7*/
		--col2: #c08d70; /*#c08d70*/
		--col3: #C18C72; /*#C18C72*/
		--col4: #724254; /*#724254*/
		--col5: #fcebb7; /*#fcebb7*/
		--negative: black;
        background-color: var(--col1);
		--pixel-size: 10px;
		--bc1: 40%;
		--bc1point0: 50%;
    }
	@font-face {
		font-family: 'pixel-font';
		src: url("{{ url_for('static', filename='assets/PixelatedElegance.ttf') }}") format('truetype'); 
		text-shadow: 0 0 1px black;
	}
    #top, #bottom, #left, #right {
		background: var(--col3);
		position: fixed;
		z-index: 0;
	}
	#left, #right {
		top: 0; bottom: 0;
		width: calc(var(--pixel-size)*2.6);
		}
		#left { left: 0; }
		#right { right: 0; }
		
	#top, #bottom {
		left: 0; right: 0;
		height: calc(var(--pixel-size)*2.6);
		}
		#top { top: 0; }
		#bottom { bottom: 0; }

	#topleftflower, #toprightflower, #bottomleftflower, #bottomrightflower {
		position:fixed;
		z-index: 1;
		width: calc(var(--pixel-size)*8);
		height: calc(var(--pixel-size)*8);
		image-rendering:pixelated;
	}
		#topleftflower {
		left: calc(var(--pixel-size)/10);
		top: calc(var(--pixel-size)/10);
		transform: scale(.75);
		}
		#toprightflower {
		right: calc(var(--pixel-size)/10);
		top: calc(var(--pixel-size)/10);
		transform: rotate(90deg) scale(.75);
		}
		#bottomrightflower {
		right: calc(var(--pixel-size)/10);
		bottom: calc(var(--pixel-size)/10);
		transform: rotate(180deg) scale(.75);
		}
		#bottomleftflower {
		left: calc(var(--pixel-size)/10);
		bottom: calc(var(--pixel-size)/10);
		transform: rotate(270deg) scale(.75);
		}
	#glorbenialabel {
		position:fixed;
		z-index:1;
		image-rendering:pixelated;
		top:10%;
		transform: translate(-50%, -50%) scale(6);
		left:auto;
	}
	#discordimg, #documentimg, #bankimg, #mailimg {
		position:fixed;
		z-index:3;
		image-rendering:pixelated;
		transform: translate(-40%, -50%) scale(7);
		left:var(--bc1point0);
	}
	#documentimg {
		top:35%;
	}
	#bankimg {
		top:51.67%;
	}
	#discordimg {
		top:68.33%;
	}
	#mailimg {
		top:85%;
	}
	.buttony-class {
		text-align:center;
		color:var(--col5);
		font-family:'pixel-font' ;
		align-content:center;
		position:fixed;
		background-color:var(--col3);
		border:calc(var(--pixel-size)/2) solid var(--col4);
		width:340px;
		height:calc(var(--pixel-size)*6);
		left:var(--bc1);
		transform:translate(-100%, -40%) scale(2);
		font-size:200%;
	}
	.buttony-class:hover {
		background-color:var(--col4);
		border:calc(var(--pixel-size)/3) solid var(--col3);
		cursor:pointer;
	}

	#newsbox {
		position:fixed;
		right:20%;
		top:60%;
		transform:translate(-50%, -50%) scale(8);
		background-image: url({{ url_for('static', filename='assets/News Box.png') }});
		width:59px;
		height:82px;
		image-rendering: pixelated;
	}
	#newsposts::-webkit-scrollbar {
		width: 4px;
		height: 8px;
		border-radius: 2px;
		background-color: var(--col2);
	}

	#newsposts::-webkit-scrollbar-thumb {
		background: var(--col4);
		border-radius: 2px;
	}
	#newsposts {
		position:fixed;
		width:100%;
		height:80%;
		overflow:hidden;
		overflow-y:scroll;
		transform:translate(2.5%,20%);
	}

	.post {
		position:relative;
		text-align:center;
		width:90%;
		padding:1px;
		margin:1px;
		height:fit-content;
		font-size:.15cqw;
		font-family:"pixel-font";
		background-color: var(--col5);
		border: 1px solid var(--col4)
	}
	.post-date {
		text-align:left;
		font-size:smaller;
		font-family:"pixel-font";
		color: var(--col2);
		padding:1px;
		padding-bottom:0px;
		margin:1px;
	}
	.post-title {
		position:relative;
		text-align:center;
		width:90%;
		padding:1px;
		padding-top:0px;
		margin:1px;
		height:fit-content;
		font-size:.05cqw;
		font-family:"pixel-font";
		background-color: var(--col3);
		border: 1px solid var(--col4)
	}
</style>
<head>
	<title>Glorbenia Website</title>
	<link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/glorbenia-flag.png') }}">
</head>
<body onload="onload()" style="text-align:center;">
	<!-- credits -->
	<h id="credits" style="position:fixed;left:5%;top:95%;color:var(--negative);">Credits: Walmart Bag - Pixel art. Diggy - Programming</h>

	<!-- border -->
    <div id="left"></div>
    <div id="right"></div>
    <div id="top"></div>
    <div id="bottom"></div>

	<img id="topleftflower" src="{{ url_for('static', filename='assets/flower.png') }}">
	<img id="toprightflower" src="{{ url_for('static', filename='assets/flower.png') }}">
	<img id="bottomleftflower" src="{{ url_for('static', filename='assets/flower.png') }}">
	<img id="bottomrightflower" src="{{ url_for('static', filename='assets/flower.png') }}">


	<!-- big label -->
	<img id="glorbenialabel"src="{{ url_for('static', filename='assets/Glorb.png') }}">


	<!-- icons -->
	<img id="discordimg"src="{{ url_for('static', filename='assets/Discord.png') }}">
	<img id="documentimg"src="{{ url_for('static', filename='assets/Document.png') }}">
	<!--<img id="bankimg"src="../assets/static/Bank.png"> finish bank 'https://glorbank.onrender.com' -->
	<img id="mailimg"src="{{ url_for('static', filename='assets/Mail.png') }}">


	<!-- column-->
	<button class="buttony-class" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdJwTBci4Js_L1AR_4BHIZ3yRpGQrjaQMy48UfdPArMviqhgw/viewform?usp=publish-editor')" style="top:35%;">Sign Up!   </button>
	<button  class="buttony-class" style="top:51.67%;background-color:var(--col4);border-color:var(--col2);border:calc(var(--pixel-size)/3) solid var(--col3);">Coming soon >:3   </button> <!-- finish bank 'https://glorbank.onrender.com' -->
	<button class="buttony-class" onclick="window.open('https://discord.gg/3BEMZgGKVX')" style="top:68.33%;">Our Discord    </button>
	<button  class="buttony-class" onclick="window.open('mailto:webstate.mail@gmail.com')" style="top:85%;">Contact Us!   </button>

	<!-- news box -->
	<div id="newsbox">
		<div id="newsposts">
			<div class="post">
				<div class="post-date">Mar. 21, 2026</div>
				<div class="post-title">UWG website is LIVE!</div><br>
				Join our Discord server! (<a href='https://discord.gg/3BEMZgGKVX' target="_blank">discord.gg/3BEMZgGKVX</a>)
			</div>
		</div>
	</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/textfit@2.4.0/textFit.min.js"></script>
<script>
	var sound = new Audio({{ url_for('static', filename='assets/Bark.wav') }});
	sound.load()
	document.getElementById("glorbenialabel").addEventListener("click", () => {
		sound.play()
	});

	function onload() {
		const time = new Date();
		if (time.getHours() > 22 || time.getHours < 6) {
			/*javascript set elements*/
			document.body.style.setProperty("--col1","#8b6d9c");
			document.body.style.setProperty("--col2","#494d7e");
			document.body.style.setProperty("--col3","#494d7e");
			document.body.style.setProperty("--col4","#272744");
			document.body.style.setProperty("--col5","#c69fa5");
			document.body.style.setProperty("--negative","#FFF");

			document.getElementById("toprightflower").src = "{{ url_for('static', filename='assets/DarkLeaf.png') }}";
			document.getElementById("topleftflower").src = "{{ url_for('static', filename='assets/DarkLeaf.png') }}";
			document.getElementById("bottomrightflower").src = "{{ url_for('static', filename='assets/DarkLeaf.png') }}";
			document.getElementById("bottomleftflower").src = "{{ url_for('static', filename='assets/DarkLeaf.png') }}";
		};
		textFit(document.querySelectorAll(".post-title"))
	};
	
</script>
</html>
